<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>反射神経ゲーム（スマホ対応）</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  text-align:center;
  font-family:sans-serif;
  margin:0;
  padding:20px;
  background:#f5f5f5;
}

h1{
  font-size:28px;
}

button{
  font-size:20px;
  padding:15px 30px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  margin-top:10px;
}

#box{
  width:90%;
  max-width:350px;
  height:300px;
  background:gray;
  margin:30px auto;
  line-height:300px;
  font-size:26px;
  color:white;
  border-radius:15px;
  cursor:pointer;
  user-select:none;

  /* スマホの反応を良くする */
  touch-action: manipulation;
}

#result{
  font-size:22px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>反射神経ゲーム</h1>

<button onclick="startGame()">スタート</button>

<div id="box">ここをタップ！</div>

<p id="result"></p>

<script>
let startTime;

// スタート
function startGame(){
  startTime = null;
  document.getElementById("result").innerHTML = "待ってください...";
  document.getElementById("box").style.background = "gray";

  let random = Math.random() * 3000 + 1000;

  setTimeout(function(){
    document.getElementById("box").style.background = "red";

    let sound = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
    sound.play();

    startTime = new Date().getTime();
  }, random);
}

// クリック・タップ処理（共通）
function clickGame(){

  if(!startTime){
    document.getElementById("result").innerHTML = "フライング！";
    return;
  }

  let endTime = new Date().getTime();
  let reaction = (endTime - startTime) / 1000;

  if(reaction < 0.25){
    document.getElementById("result").innerHTML =
      "あなたの反応速度は " + reaction + " 秒です！<br>神レベル！🔥";
  }
  else if(reaction < 0.35){
    document.getElementById("result").innerHTML =
      "あなたの反応速度は " + reaction + " 秒です！<br>天才！✨";
  }
  else if(reaction < 0.5){
    document.getElementById("result").innerHTML =
      "あなたの反応速度は " + reaction + " 秒です！<br>すごい！😆";
  }
  else{
    document.getElementById("result").innerHTML =
      "あなたの反応速度は " + reaction + " 秒です！<br>もう一回チャレンジ！";
  }

  startTime = null;
  document.getElementById("box").style.background = "gray";
}

// PCクリック
document.getElementById("box").onclick = clickGame;

// スマホタップ（改善ポイント！）
document.getElementById("box").ontouchend = function(e){
  e.preventDefault(); // 二重反応防止
  clickGame();
};
</script>

</body>
</html>
